apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: local-lab
  source:
    repoURL: https://github.com/edwardmccormick/argocd-example-apps.git
    targetRevision: HEAD
    path: platform/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  info:
    - name: stack
      value: Prometheus, Grafana, Blackbox Exporter, and OpenTelemetry Collector running locally.
    - name: purpose
      value: Local OpenTelemetry-compatible observability baseline for guestbook and later AI workloads.
  revisionHistoryLimit: 5
