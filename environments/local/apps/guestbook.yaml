apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook
  namespace: argocd
spec:
  project: local-lab
  source:
    repoURL: https://github.com/edwardmccormick/argocd-example-apps.git
    targetRevision: main
    path: helm-guestbook
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  info:
    - name: sync-mode
      value: Automated with prune and self-heal after the legacy app cutover.
    - name: status
      value: Helm is now the active source of truth for the guestbook workload.
  revisionHistoryLimit: 5
