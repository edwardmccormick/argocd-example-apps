apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-helm
  namespace: argocd
spec:
  project: local-lab
  source:
    repoURL: https://github.com/edwardmccormick/argocd-example-apps.git
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  info:
    - name: sync-mode
      value: Manual until the legacy non-Helm guestbook app is removed.
    - name: status
      value: Helm now renders the guestbook workload, but auto-sync stays off until the legacy app is removed.
  revisionHistoryLimit: 5
