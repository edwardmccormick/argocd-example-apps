apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-guestbook.fullname" . }}
  labels:
    {{- include "helm-guestbook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "helm-guestbook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "helm-guestbook.labels" . | nindent 8 }}
        {{- include "helm-guestbook.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ include "helm-guestbook.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          {{- if .Values.telemetry.enabled }}
          env:
            - name: APACHE_LOG_DIR
              value: {{ .Values.telemetry.apacheLogDir | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: apache-run
              mountPath: /var/run/apache2
            - name: apache-lock
              mountPath: /var/lock/apache2
            - name: apache-lib
              mountPath: /var/lib/apache2
            - name: apache-tmp
              mountPath: /tmp
          {{- if .Values.telemetry.enabled }}
            - name: apache-logs
              mountPath: {{ .Values.telemetry.apacheLogDir }}
            - name: guestbook-telemetry-config
              mountPath: /etc/apache2/conf-enabled/guestbook-status.conf
              subPath: guestbook-status.conf
          {{- end }}
        {{- if .Values.telemetry.enabled }}
        - name: otel-sidecar
          image: "{{ .Values.telemetry.sidecarImage.repository }}:{{ .Values.telemetry.sidecarImage.tag }}"
          imagePullPolicy: {{ .Values.telemetry.sidecarImage.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          args:
            - --config=/conf/otel-sidecar-config.yaml
          volumeMounts:
            - name: apache-logs
              mountPath: {{ .Values.telemetry.apacheLogDir }}
            - name: guestbook-telemetry-config
              mountPath: /conf/otel-sidecar-config.yaml
              subPath: otel-sidecar-config.yaml
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: apache-run
          emptyDir: {}
        - name: apache-lock
          emptyDir: {}
        - name: apache-lib
          emptyDir: {}
        - name: apache-tmp
          emptyDir: {}
      {{- if .Values.telemetry.enabled }}
        - name: apache-logs
          emptyDir: {}
        - name: guestbook-telemetry-config
          configMap:
            name: {{ include "helm-guestbook.fullname" . }}-telemetry
      {{- end }}
