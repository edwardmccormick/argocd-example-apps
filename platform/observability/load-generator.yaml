apiVersion: v1
kind: ConfigMap
metadata:
  name: guestbook-load-test
data:
  script.js: |
    import http from 'k6/http';
    import { sleep } from 'k6';

    export const options = {
      vus: 5,
      duration: '30s',
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<250'],
      },
    };

    const target = __ENV.TARGET_URL || 'http://guestbook-ui.default.svc.cluster.local/';

    export default function () {
      http.get(target, {
        tags: {
          service: 'guestbook-ui',
          environment: 'local',
        },
      });
      sleep(1);
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: guestbook-load-generator
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: Never
          containers:
            - name: k6
              image: grafana/k6:0.49.0
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 12345
                runAsGroup: 12345
                capabilities:
                  drop:
                    - ALL
              env:
                - name: TARGET_URL
                  value: http://guestbook-ui.default.svc.cluster.local/
              command:
                - k6
                - run
                - /scripts/script.js
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: guestbook-load-test
