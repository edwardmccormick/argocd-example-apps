apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: blackbox-guestbook
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://guestbook-ui.default.svc.cluster.local/
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter.observability.svc.cluster.local:9115

      - job_name: otel-collector
        static_configs:
          - targets:
              - otel-collector.observability.svc.cluster.local:8889
  guestbook-alerts.yml: |
    groups:
      - name: guestbook.rules
        rules:
          - alert: GuestbookUnavailable
            expr: probe_success{job="blackbox-guestbook"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: Guestbook probe failed
              description: Guestbook has not returned a successful HTTP response for at least 2 minutes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: quay.io/prometheus/prometheus:v2.53.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/rules/guestbook-alerts.yml
              subPath: guestbook-alerts.yml
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
