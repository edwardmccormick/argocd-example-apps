apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ai-reliability
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ai-reliability
  template:
    metadata:
      labels:
        app: ai-reliability
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001
      containers:
        - name: ai-reliability
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          env:
            - name: AI_CORPUS_DIR
              value: /corpus
            - name: AI_DEFAULT_MODE
              value: extractive
            - name: AI_GENERATIVE_PROVIDER
              value: gemini
            - name: GEMINI_BASE_URL
              value: https://generativelanguage.googleapis.com/v1beta
            - name: GEMINI_MODEL
              value: ""
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-reliability-llm
                  key: gemini-api-key
                  optional: true
            - name: PORT
              value: "8080"
            - name: TOP_K
              value: "3"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: corpus
              mountPath: /corpus
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: ai-reliability-app
        - name: corpus
          configMap:
            name: ai-reliability-corpus
        - name: tmp
          emptyDir: {}
  strategy:
    canary:
      stableService: ai-reliability-stable
      canaryService: ai-reliability-canary
      maxSurge: 1
      maxUnavailable: 0
      stableMetadata:
        labels:
          rollouts-phase: stable
      canaryMetadata:
        labels:
          rollouts-phase: canary
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: ai-reliability-canary-analysis
        - setWeight: 50
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: ai-reliability-canary-analysis
        - setWeight: 100
        - pause:
            duration: 15s
