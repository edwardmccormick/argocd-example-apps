apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ai-reliability-canary-analysis
spec:
  args:
    - name: canary-base-url
      value: http://ai-reliability-canary.ai-lab.svc.cluster.local:8080
    - name: prometheus-address
      value: http://prometheus.observability.svc.cluster.local:9090
    - name: canary-burst-vus
      value: "4"
    - name: canary-burst-duration
      value: 45s
    - name: canary-generative-ratio
      value: "0"
  metrics:
    - name: canary-burst-traffic
      failureLimit: 1
      provider:
        job:
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: 180
            template:
              spec:
                restartPolicy: Never
                securityContext:
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: k6
                    image: grafana/k6:0.49.0
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      runAsUser: 12345
                      runAsGroup: 12345
                      capabilities:
                        drop:
                          - ALL
                    command:
                      - k6
                      - run
                      - /scripts/script.js
                    env:
                      - name: CANARY_BASE_URL
                        value: "{{args.canary-base-url}}"
                      - name: VUS
                        value: "{{args.canary-burst-vus}}"
                      - name: DURATION
                        value: "{{args.canary-burst-duration}}"
                      - name: GENERATIVE_RATIO
                        value: "{{args.canary-generative-ratio}}"
                      - name: TOP_K
                        value: "3"
                    volumeMounts:
                      - name: script
                        mountPath: /scripts
                        readOnly: true
                volumes:
                  - name: script
                    configMap:
                      name: ai-reliability-canary-burst
    - name: canary-ready
      interval: 20s
      count: 2
      failureLimit: 1
      successCondition: result.status == "ready" && result.corpus_chunks > 0
      provider:
        web:
          url: "{{args.canary-base-url}}/readyz"
          timeoutSeconds: 10
          jsonPath: "{$}"
    - name: canary-trivy-answer
      interval: 20s
      count: 2
      failureLimit: 1
      successCondition: result.grounded == true && result.result == "success"
      provider:
        web:
          method: POST
          url: "{{args.canary-base-url}}/ask"
          timeoutSeconds: 10
          headers:
            - key: Content-Type
              value: application/json
          jsonBody:
            question: What operational value did the Trivy and smoke-test notes describe?
            top_k: 3
          jsonPath: "{$}"
    - name: canary-observability-answer
      interval: 20s
      count: 2
      failureLimit: 1
      successCondition: result.grounded == true && result.result == "success"
      provider:
        web:
          method: POST
          url: "{{args.canary-base-url}}/ask"
          timeoutSeconds: 10
          headers:
            - key: Content-Type
              value: application/json
          jsonBody:
            question: What does the observability baseline say about service indicators?
            top_k: 3
          jsonPath: "{$}"
    - name: canary-metrics-up
      interval: 30s
      count: 2
      failureLimit: 1
      successCondition: len(result) > 0 && result[0] >= 1
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            min_over_time(up{job="ai-docqa-canary"}[2m])
    - name: canary-request-volume
      interval: 30s
      count: 2
      failureLimit: 1
      successCondition: len(result) > 0 && result[0] >= 40
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            sum(increase(ai_docqa_requests_total{job="ai-docqa-canary",endpoint="/ask"}[2m]))
    - name: canary-workflow-completion
      interval: 30s
      count: 2
      failureLimit: 1
      successCondition: len(result) > 0 && result[0] >= 0.95
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            sum(increase(ai_docqa_workflow_completions_total{job="ai-docqa-canary",result="success"}[2m]))
            /
            clamp_min(sum(increase(ai_docqa_workflow_completions_total{job="ai-docqa-canary"}[2m])), 1)
    - name: canary-insufficient-context
      interval: 30s
      count: 2
      failureLimit: 1
      successCondition: len(result) > 0 && result[0] <= 0.10
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            sum(increase(ai_docqa_requests_total{job="ai-docqa-canary",endpoint="/ask",status="insufficient_context"}[2m]))
            /
            clamp_min(sum(increase(ai_docqa_requests_total{job="ai-docqa-canary",endpoint="/ask"}[2m])), 1)
    - name: canary-insufficient-context-answer
      interval: 20s
      count: 2
      failureLimit: 1
      successCondition: result.grounded == false && result.result == "insufficient_context"
      provider:
        web:
          method: POST
          url: "{{args.canary-base-url}}/ask"
          timeoutSeconds: 10
          headers:
            - key: Content-Type
              value: application/json
          jsonBody:
            question: What is the weather in Chicago today?
            top_k: 3
          jsonPath: "{$}"
