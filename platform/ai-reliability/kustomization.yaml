apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-lab

generatorOptions:
  disableNameSuffixHash: true

resources:
- namespace.yaml
- rollout.yaml
- analysis-template.yaml
- service.yaml
- ingressroute.yaml
- hpa.yaml

configMapGenerator:
- name: ai-reliability-canary-burst
  files:
  - script.js=scripts/canary-burst.js
- name: ai-reliability-corpus
  files:
  - corpus/README.md
  - corpus/etl-modernization-work.md
  - corpus/payments-authorization-work.md
  - corpus/soap-modernization-work.md
  - corpus/observability-baseline.md
  - corpus/failure-drill-guestbook-readiness.md
  - corpus/trivy-and-smoketest-notes.md
