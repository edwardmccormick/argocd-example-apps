apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-lab

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml

configMapGenerator:
  - name: ai-reliability-app
    files:
      - engine.py=app/engine.py
      - server.py=app/server.py
      - eval_cases.json=app/eval_cases.json
      - replay_cases.json=app/replay_cases.json
  - name: ai-reliability-corpus
    files:
      - corpus/README.md
      - corpus/etl-modernization-work.md
      - corpus/payments-authorization-work.md
      - corpus/soap-modernization-work.md
      - corpus/observability-baseline.md
      - corpus/failure-drill-guestbook-readiness.md
      - corpus/trivy-and-smoketest-notes.md
