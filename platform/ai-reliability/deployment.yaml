apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-reliability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-reliability
  template:
    metadata:
      labels:
        app: ai-reliability
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001
      containers:
        - name: ai-reliability
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          env:
            - name: AI_CORPUS_DIR
              value: /corpus
            - name: PORT
              value: "8080"
            - name: TOP_K
              value: "3"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: corpus
              mountPath: /corpus
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: ai-reliability-app
        - name: corpus
          configMap:
            name: ai-reliability-corpus
        - name: tmp
          emptyDir: {}
