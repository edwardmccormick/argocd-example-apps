name: Validate Manifests

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Set up kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Set up YAML tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml yamllint

      - name: Helm lint
        run: helm lint ./helm-guestbook

      - name: Helm template default
        run: helm template guestbook ./helm-guestbook > /tmp/guestbook-default.yaml

      - name: Helm template production override
        run: helm template guestbook ./helm-guestbook -f ./helm-guestbook/value-production.yaml > /tmp/guestbook-production.yaml

      - name: Render local environment
        run: kubectl kustomize ./environments/local > /tmp/environments-local.yaml

      - name: Render AI reliability platform
        run: kubectl kustomize ./platform/ai-reliability > /tmp/ai-reliability.yaml

      - name: YAML syntax check
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, new-lines: disable, new-line-at-end-of-file: disable, truthy: disable}}" \
            ./argocd-ingress.yaml \
            ./platform/argocd/root-application.yaml \
            ./environments/local \
            ./platform/ai-reliability \
            ./platform/observability \
            ./helm-guestbook/values.yaml \
            ./helm-guestbook/value-production.yaml \
            ./helm-guestbook/Chart.yaml
          python3 - <<'PY'
          import yaml
          files = [
              "./argocd-ingress.yaml",
              "./platform/argocd/root-application.yaml",
          ]
          for path in files:
              with open(path, "r", encoding="utf-8") as fh:
                  list(yaml.safe_load_all(fh))
          print("yaml_parse_ok")
          PY

      - name: Kubeconform core manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas /tmp/guestbook-default.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/guestbook-production.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/environments-local.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/ai-reliability.yaml
          kubeconform -strict -summary -ignore-missing-schemas ./argocd-ingress.yaml
          kubeconform -strict -summary -ignore-missing-schemas ./platform/argocd/root-application.yaml

      - name: Run deterministic AI evals
        id: deterministic_ai_eval
        continue-on-error: true
        run: |
          set +e
          python3 ./platform/ai-reliability/app/run_eval.py \
            --corpus-dir ./platform/ai-reliability/corpus \
            --eval-file ./platform/ai-reliability/app/eval_cases.json \
            --output-file /tmp/ai-eval-summary.json
          eval_exit_code=$?

          if [ ! -s /tmp/ai-eval-summary.json ]; then
            echo '{"total":0,"passed":0,"failed":1,"by_category":{},"results":[{"id":"eval_summary_missing","category":"workflow","ok":false,"response_result":null,"documents":[],"answer":null,"error":"deterministic eval command failed before writing summary output"}]}' > /tmp/ai-eval-summary.json
          fi

          cat /tmp/ai-eval-summary.json
          echo "exit_code=${eval_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload deterministic AI eval summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-summary
          path: /tmp/ai-eval-summary.json
          retention-days: 7

      - name: Enforce deterministic AI eval gate
        if: steps.deterministic_ai_eval.outputs.exit_code != '0'
        run: |
          echo "Deterministic AI evals failed"
          exit 1

      - name: Set up Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy config scan
        run: |
          trivy config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --quiet \
            .

  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ci-smoke

      - name: Install Argo Rollouts controller
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm install argo-rollouts argo/argo-rollouts \
            --namespace argo-rollouts \
            --create-namespace \
            --version 2.40.5
          kubectl rollout status deployment/argo-rollouts -n argo-rollouts --timeout=180s

      - name: Install guestbook chart
        run: |
          helm install guestbook ./helm-guestbook \
            --set traefikIngressRoute.enabled=false \
            --set telemetry.enabled=false

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/guestbook-ui --timeout=180s
          kubectl wait --for=condition=available deployment/guestbook-ui --timeout=180s

      - name: Smoke test diagnostics
        if: failure()
        run: |
          kubectl get all
          echo "---"
          kubectl describe deployment guestbook-ui
          echo "---"
          kubectl get pods -l app=guestbook-ui -o wide
          echo "---"
          kubectl describe pods -l app=guestbook-ui
          echo "---"
          kubectl logs deployment/guestbook-ui --tail=100 || true
          echo "---"
          for pod in $(kubectl get pods -l app=guestbook-ui -o jsonpath='{.items[*].metadata.name}'); do
            echo "### logs for ${pod}"
            kubectl logs "$pod" --all-containers=true --tail=100 || true
            echo "---"
          done

      - name: Smoke test guestbook service
        run: |
          kubectl run guestbook-smoke \
            --image=curlimages/curl:8.10.1 \
            --restart=Never \
            --rm \
            -i \
            --command -- \
            sh -c '
              set -eu
              response="$(curl -fsS http://guestbook-ui.default.svc.cluster.local/)"
              echo "$response"
              echo "$response" | grep -qi "<html"
              echo "$response" | grep -qi "guestbook"
            '

      - name: Install AI reliability service
        run: |
          kubectl kustomize ./platform/ai-reliability > /tmp/ai-reliability-smoke.yaml
          python3 - <<'PY'
          import yaml

          source = "/tmp/ai-reliability-smoke.yaml"
          target = "/tmp/ai-reliability-smoke-no-ingress.yaml"

          with open(source, "r", encoding="utf-8") as fh:
              docs = [doc for doc in yaml.safe_load_all(fh) if doc]

          filtered = []
          for doc in docs:
              api_version = doc.get("apiVersion")
              kind = doc.get("kind")

              if api_version == "traefik.containo.us/v1alpha1" and kind == "IngressRoute":
                  continue

              if kind == "AnalysisTemplate":
                  continue

              if kind == "Rollout":
                  canary = doc.setdefault("spec", {}).setdefault("strategy", {}).setdefault("canary", {})
                  canary["steps"] = [{"setWeight": 100}]

              filtered.append(doc)

          with open(target, "w", encoding="utf-8") as fh:
              yaml.safe_dump_all(filtered, fh, sort_keys=False)
          PY
          kubectl apply -f /tmp/ai-reliability-smoke-no-ingress.yaml

      - name: Wait for AI reliability rollout
        run: |
          kubectl wait \
            --for=jsonpath='{.status.readyReplicas}'=1 \
            rollout/ai-reliability \
            -n ai-lab \
            --timeout=180s
          kubectl wait \
            --for=condition=ready \
            pod \
            -n ai-lab \
            -l app=ai-reliability \
            --timeout=180s

      - name: AI smoke test diagnostics
        if: failure()
        run: |
          kubectl get all -n ai-lab
          echo "---"
          kubectl get svc,endpoints,endpointslice -n ai-lab || true
          echo "---"
          kubectl get rollouts.argoproj.io -n ai-lab ai-reliability -o yaml || true
          echo "---"
          kubectl get rs -n ai-lab -o wide || true
          echo "---"
          kubectl get analysisruns.argoproj.io -n ai-lab -o yaml || true
          echo "---"
          kubectl get pods -n ai-lab -l app=ai-reliability -o wide || true
          echo "---"
          kubectl describe pods -n ai-lab -l app=ai-reliability || true
          echo "---"
          for pod in $(kubectl get pods -n ai-lab -l app=ai-reliability -o jsonpath='{.items[*].metadata.name}'); do
            echo "### logs for ${pod}"
            kubectl logs -n ai-lab "$pod" --all-containers=true --tail=100 || true
            echo "---"
          done

      - name: Smoke test AI reliability service
        run: |
          kubectl run ai-reliability-smoke \
            -n ai-lab \
            --image=curlimages/curl:8.10.1 \
            --restart=Never \
            --rm \
            -i \
            --command -- \
            sh -c '
              set -eu
              curl -fsS http://ai-reliability-stable.ai-lab.svc.cluster.local:8080/healthz
              echo
              curl -fsS http://ai-reliability-stable.ai-lab.svc.cluster.local:8080/readyz
              echo
              response="$(curl -fsS \
                -H "Content-Type: application/json" \
                -d '"'"'{"question":"What operational value did the Trivy and smoke-test notes describe?"}'"'"' \
                http://ai-reliability-stable.ai-lab.svc.cluster.local:8080/ask)"
              echo "$response"
              echo "$response" | grep -q "\"result\":"
              echo "$response" | grep -q "\"citations\":"
            '

      - name: AI smoke service diagnostics
        if: failure()
        run: |
          kubectl get svc,endpoints,endpointslice -n ai-lab || true
          echo "---"
          kubectl describe svc ai-reliability -n ai-lab || true
          echo "---"
          kubectl describe svc ai-reliability-stable -n ai-lab || true
          echo "---"
          kubectl describe svc ai-reliability-canary -n ai-lab || true
