name: Build AI Image

"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ai-image.yaml
      - platform/ai-reliability/Dockerfile
      - platform/ai-reliability/.dockerignore
      - platform/ai-reliability/app/**
      - scripts/update_ai_image_ref.py
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-ai-image-main
  cancel-in-progress: false

jobs:
  build-and-pin:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve GitHub App configuration
        id: app-config
        env:
          APP_ID_VAR: ${{ vars.AI_IMAGE_PINNER_APP_ID }}
          APP_ID_SECRET: ${{ secrets.AI_IMAGE_PINNER_APP_ID }}
          APP_KEY: ${{ secrets.AI_IMAGE_PINNER_PRIVATE_KEY }}
        run: |
          app_id="${APP_ID_VAR:-}"
          if [ -z "$app_id" ]; then
            app_id="${APP_ID_SECRET:-}"
          fi

          # Remove all whitespace (including newlines) from the app_id and validate it.
          app_id="$(printf '%s' "$app_id" | tr -d '[:space:]')"

          if [ -z "$app_id" ]; then
            echo "::error::Missing GitHub App ID. Set repository variable AI_IMAGE_PINNER_APP_ID (preferred) or repository secret AI_IMAGE_PINNER_APP_ID to the numeric GitHub App ID."
            exit 1
          fi

          case "$app_id" in
            *[!0-9]*)
              echo "::error::Invalid GitHub App ID '$app_id'. It must consist of digits only."
              exit 1
              ;;
          esac
          if [ -z "${APP_KEY:-}" ]; then
            echo "::error::Missing repository secret AI_IMAGE_PINNER_PRIVATE_KEY."
            exit 1
          fi

          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.app-config.outputs.app_id }}
          private-key: ${{ secrets.AI_IMAGE_PINNER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set image coordinates
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ai-reliability"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./platform/ai-reliability
          file: ./platform/ai-reliability/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML dependency
        run: python3 -m pip install pyyaml ruamel.yaml

      - name: Update rollout to pinned digest
        run: |
          python3 ./scripts/update_ai_image_ref.py \
            --image-ref "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Commit pinned image update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet -- platform/ai-reliability/rollout.yaml platform/ai-reliability/kustomization.yaml; then
            echo "No rollout changes to commit."
            exit 0
          fi

          python3 ./scripts/commit_files_via_github_api.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${GITHUB_REF_NAME}" \
            --message "Pin ai-reliability image to ${{ steps.build.outputs.digest }}" \
            platform/ai-reliability/rollout.yaml \
            platform/ai-reliability/kustomization.yaml
