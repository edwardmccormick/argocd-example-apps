name: Build AI Image

"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ai-image.yaml
      - platform/ai-reliability/Dockerfile
      - platform/ai-reliability/.dockerignore
      - platform/ai-reliability/app/**
      - scripts/update_ai_image_ref.py
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-pin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image coordinates
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ai-reliability"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./platform/ai-reliability
          file: ./platform/ai-reliability/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML dependency
        run: python3 -m pip install pyyaml

      - name: Update rollout to pinned digest
        run: |
          python3 ./scripts/update_ai_image_ref.py \
            --image-ref "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Commit pinned image update
        run: |
          if git diff --quiet -- platform/ai-reliability/rollout.yaml platform/ai-reliability/kustomization.yaml; then
            echo "No rollout changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add platform/ai-reliability/rollout.yaml platform/ai-reliability/kustomization.yaml
          git commit -m "Pin ai-reliability image to ${{ steps.build.outputs.digest }}"
          git push
